<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AU Real Estate Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
            text-align: center;
        }
        h1 {
            color: #333;
        }
        p {
            margin-bottom: 20px;
        }
        a {
            color: #007bff;
            text-decoration: none;
            margin: 0 10px;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Welcome to AU Real Estate Tracker</h1>
    {% if user.is_authenticated %}
        <p>Hello, {{ user.username }}!</p>
        <p><a href="{% url 'address_list' %}">View Addresses</a></p>
        {% if user.is_staff %}
            <p><a href="{% url 'admin:index' %}">Admin</a></p>
        {% endif %}
        <p><a href="{% url 'logout' %}">Logout</a></p>
    {% else %}
        <p>Please log in to access the address tracker.</p>
        <p><a href="{% url 'login' %}">Login</a></p>
    {% endif %}
</body>
</html>
