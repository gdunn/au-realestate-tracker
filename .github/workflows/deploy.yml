name: Deploy via SCP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  scp-deploy:
    runs-on: ubuntu-latest
    environment: hostingdotcom
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH key
        env:
          SSH_CERT_PRIVATE: ${{ secrets.SSH_CERT_PRIVATE }}
        run: |
          set -e
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_CERT_PRIVATE" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Upload via rsync over SSH
        env:
          SSH_CERT_PASSWORD: ${{ secrets.SSH_CERT_PASSWORD }}
          SSH_HOSTNAME: warmage.com
          SSH_USERNAME: warmagec
        run: |
          set -e
          # Configure SSH to skip host key checks in CI
          printf 'Host *\n  StrictHostKeyChecking no\n  UserKnownHostsFile=/dev/null\n' > ~/.ssh/config
          chmod 600 ~/.ssh/config

          # Start ssh-agent and add key with passphrase
          eval "$(ssh-agent -s)"
          sudo apt-get update && sudo apt-get install -y expect
          expect <<'EOF'
            spawn ssh-add ~/.ssh/deploy_key
            expect "Enter passphrase for ~/.ssh/deploy_key:"
            send "$env(SSH_CERT_PASSWORD)\r"
            expect eof
          EOF

          # Ensure remote directory exists
          ssh -o StrictHostKeyChecking=no "$SSH_USERNAME@$SSH_HOSTNAME" "mkdir -p /home/warmagec/realestate"

          # Upload files while excluding unwanted files/directories
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='db.sqlite3' \
            --exclude='**/__pycache__/**' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ "$SSH_USERNAME@$SSH_HOSTNAME:/home/warmagec/realestate/"

