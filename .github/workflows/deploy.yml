name: Deploy via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload via FTP
        env:
          FTP_HOSTNAME: ${{ secrets.FTP_HOSTNAME }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          # iterate through files and upload excluding patterns
          find . -type f \
            ! -path "./.github/*" \
            ! -path "./.git/*" \
            ! -path "*/__pycache__/*" \
            ! -name "db.sqlite3" | \
          while read -r file; do
            dst=$(dirname "$file")
            lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_HOSTNAME" -e \
              "mkdir -p $dst; put -O $dst $file; bye"
          done
