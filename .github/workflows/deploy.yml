name: Deploy via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    environment: hostnamedotcom
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Show environment info
        run: |
          # dump the job and github contexts so we can inspect available fields
          echo "job context: ${{ toJson(job) }}"
          echo "github context: ${{ toJson(github) }}"
          # try both possible properties
          echo "job.environment (should be name): ${{ job.environment }}"
          echo "github.environment: ${{ github.environment }}"

      - name: Show values
        run: | 
          echo "Hostname: $FTP_HOSTNAME"
          echo "Username: ${{ secrets.FTP_USERNAME }}"

      - name: Upload via FTP
        env:
          FTP_HOSTNAME: ${{ env.FTP_HOSTNAME }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          # iterate through files and upload excluding patterns
          echo "Connecting to $FTP_HOSTNAME with user $FTP_USERNAME"
          find . -type f \
            ! -path "./.github/*" \
            ! -path "./.git/*" \
            ! -path "*/__pycache__/*" \
            ! -name "db.sqlite3" | \
          while read -r file; do
            dst=$(dirname "$file")
            lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_HOSTNAME" -e \
              "mkdir -p $dst; put -O $dst $file; bye"
          done
